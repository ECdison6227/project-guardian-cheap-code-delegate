<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Project Guardian and Cheap Code Delegate Workflow</title>
  <desc id="desc">An academic-style workflow diagram showing project resume, risk classification, skill reuse, safe delegation, Codex review, validation, and checkpointing.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .canvas { fill: #ffffff; }
      .lane { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.2; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 1.6; rx: 6; }
      .box-muted { fill: #eef2f7; stroke: #334155; stroke-width: 1.4; rx: 6; }
      .decision { fill: #ffffff; stroke: #1f2937; stroke-width: 1.6; }
      .terminal { fill: #e8f1fb; stroke: #1d4ed8; stroke-width: 1.5; rx: 16; }
      .unsafe { fill: #fff7ed; stroke: #b45309; stroke-width: 1.5; rx: 6; }
      .line { stroke: #1f2937; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: #64748b; stroke-width: 1.3; fill: none; marker-end: url(#arrow); stroke-dasharray: 5 4; }
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Arial, sans-serif; fill: #475569; }
      .lane-title { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 14px Arial, sans-serif; fill: #0f172a; }
      .text { font: 400 13px Arial, sans-serif; fill: #1f2937; }
      .small { font: 400 12px Arial, sans-serif; fill: #475569; }
      .tag { font: 700 11px Arial, sans-serif; fill: #1d4ed8; }
      .note { font: 400 12px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect class="canvas" width="1280" height="760"/>
  <text x="640" y="38" text-anchor="middle" class="title">Project Guardian + Cheap Code Delegate Workflow</text>
  <text x="640" y="62" text-anchor="middle" class="subtitle">Controlled delegation for AI-assisted software work with explicit memory, risk classification, review, and validation gates</text>

  <rect x="55" y="95" width="1170" height="185" class="lane"/>
  <text x="78" y="123" class="lane-title">Codex Lead Agent</text>

  <rect x="55" y="310" width="1170" height="170" class="lane"/>
  <text x="78" y="338" class="lane-title">Claude Code / MiMo Worker</text>

  <rect x="55" y="510" width="1170" height="170" class="lane"/>
  <text x="78" y="538" class="lane-title">Project Memory and Verification</text>

  <rect x="95" y="150" width="155" height="72" class="terminal"/>
  <text x="172.5" y="174" text-anchor="middle" class="label">User Task</text>
  <text x="172.5" y="196" text-anchor="middle" class="text">Coding, docs, tests,</text>
  <text x="172.5" y="214" text-anchor="middle" class="text">CI logs, or review</text>

  <rect x="300" y="150" width="185" height="72" class="box"/>
  <text x="392.5" y="174" text-anchor="middle" class="label">1. Resume Context</text>
  <text x="392.5" y="196" text-anchor="middle" class="text">Read .ai memory</text>
  <text x="392.5" y="214" text-anchor="middle" class="text">Check branch and status</text>

  <polygon points="570,145 660,186 570,227 480,186" class="decision"/>
  <text x="570" y="180" text-anchor="middle" class="label">2. Classify</text>
  <text x="570" y="199" text-anchor="middle" class="small">S0 / S1 / S2 / S3</text>

  <rect x="735" y="150" width="180" height="72" class="box"/>
  <text x="825" y="174" text-anchor="middle" class="label">3. Search Reuse</text>
  <text x="825" y="196" text-anchor="middle" class="text">Existing repo patterns</text>
  <text x="825" y="214" text-anchor="middle" class="text">Claude Code Skills</text>

  <polygon points="1000,145 1095,186 1000,227 905,186" class="decision"/>
  <text x="1000" y="180" text-anchor="middle" class="label">Safe to</text>
  <text x="1000" y="198" text-anchor="middle" class="label">delegate?</text>

  <rect x="735" y="350" width="190" height="72" class="box-muted"/>
  <text x="830" y="374" text-anchor="middle" class="label">4. Worker Draft</text>
  <text x="830" y="396" text-anchor="middle" class="text">Read-only, plan, or</text>
  <text x="830" y="414" text-anchor="middle" class="text">minimal safe patch</text>

  <rect x="965" y="350" width="190" height="72" class="box-muted"/>
  <text x="1060" y="374" text-anchor="middle" class="label">Worker Output</text>
  <text x="1060" y="396" text-anchor="middle" class="text">Summary, diff, tests,</text>
  <text x="1060" y="414" text-anchor="middle" class="text">risks, reuse note</text>

  <rect x="965" y="150" width="190" height="72" transform="translate(115 0)" class="unsafe"/>
  <text x="1175" y="174" text-anchor="middle" class="label">S3 / Unsafe</text>
  <text x="1175" y="196" text-anchor="middle" class="text">Keep in Codex</text>
  <text x="1175" y="214" text-anchor="middle" class="text">No worker patch</text>

  <rect x="490" y="350" width="190" height="72" class="box"/>
  <text x="585" y="374" text-anchor="middle" class="label">5. Codex Review</text>
  <text x="585" y="396" text-anchor="middle" class="text">Every changed line</text>
  <text x="585" y="414" text-anchor="middle" class="text">Accept, revise, reject</text>

  <rect x="265" y="350" width="170" height="72" class="box"/>
  <text x="350" y="374" text-anchor="middle" class="label">6. Validate</text>
  <text x="350" y="396" text-anchor="middle" class="text">Tests, lint, build,</text>
  <text x="350" y="414" text-anchor="middle" class="text">or explicit reason</text>

  <rect x="95" y="565" width="180" height="72" class="box"/>
  <text x="185" y="589" text-anchor="middle" class="label">7. Checkpoint</text>
  <text x="185" y="611" text-anchor="middle" class="text">Update .ai memory</text>
  <text x="185" y="629" text-anchor="middle" class="text">Record decisions</text>

  <rect x="330" y="565" width="180" height="72" class="box"/>
  <text x="420" y="589" text-anchor="middle" class="label">Git Boundary</text>
  <text x="420" y="611" text-anchor="middle" class="text">Ask before add,</text>
  <text x="420" y="629" text-anchor="middle" class="text">commit, branch, push</text>

  <rect x="565" y="565" width="190" height="72" class="box"/>
  <text x="660" y="589" text-anchor="middle" class="label">Reusable Learning</text>
  <text x="660" y="611" text-anchor="middle" class="text">Propose new/update</text>
  <text x="660" y="629" text-anchor="middle" class="text">Claude Skill if useful</text>

  <rect x="830" y="565" width="185" height="72" class="terminal"/>
  <text x="922.5" y="589" text-anchor="middle" class="label">Final Report</text>
  <text x="922.5" y="611" text-anchor="middle" class="text">Reuse decision</text>
  <text x="922.5" y="629" text-anchor="middle" class="text">Delegation decision</text>

  <rect x="1070" y="565" width="120" height="72" class="terminal"/>
  <text x="1130" y="589" text-anchor="middle" class="label">Done</text>
  <text x="1130" y="611" text-anchor="middle" class="text">User keeps</text>
  <text x="1130" y="629" text-anchor="middle" class="text">final control</text>

  <path d="M250 186 H300" class="line"/>
  <path d="M485 186 H480" class="line"/>
  <path d="M660 186 H735" class="line"/>
  <path d="M915 186 H905" class="line"/>
  <path d="M1095 186 H1135" class="line"/>
  <path d="M1000 227 V386 H965" class="line"/>
  <path d="M925 386 H965" class="line"/>
  <path d="M735 386 H680" class="line"/>
  <path d="M490 386 H435" class="line"/>
  <path d="M350 422 V510 H185 V565" class="line"/>
  <path d="M275 601 H330" class="line"/>
  <path d="M510 601 H565" class="line"/>
  <path d="M755 601 H830" class="line"/>
  <path d="M1015 601 H1070" class="line"/>

  <path d="M585 350 V280 H1175 V222" class="line-soft"/>
  <text x="1080" y="270" class="tag">reject unsafe output</text>

  <text x="1012" y="252" class="tag">yes: S0/S1/safe S2</text>
  <text x="1095" y="166" class="tag">no: S3/high-risk</text>
  <text x="76" y="714" class="note">Figure. Formal control flow for safe AI coding delegation. Solid arrows represent the default path; dashed arrows represent rejection or escalation back to Codex.</text>
</svg>

