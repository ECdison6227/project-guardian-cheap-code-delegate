<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1280" height="720" fill="#f9fafb"/>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <!-- title -->
  <text x="640" y="45" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#111827">Project Guardian + Cheap Code Delegate</text>
  <text x="640" y="72" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#6b7280">强制 Git 纪律 + 风险分级委派的工作流</text>

  <!-- swimlanes -->
  <rect x="40" y="100" width="1200" height="170" fill="#ffffff" stroke="#d1d5db" stroke-width="1" opacity="0.7"/>
  <rect x="40" y="270" width="1200" height="170" fill="#ffffff" stroke="#d1d5db" stroke-width="1" opacity="0.7"/>
  <rect x="40" y="440" width="1200" height="170" fill="#ffffff" stroke="#d1d5db" stroke-width="1" opacity="0.7"/>

  <text x="60" y="128" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#374151">Codex Lead Agent</text>
  <text x="60" y="298" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#374151">Claude Code / MiMo Worker</text>
  <text x="60" y="468" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#374151">Project Memory &amp; Verification</text>

  <!-- lane 1 nodes -->
  <g transform="translate(80, 160)" filter="url(#shadow)">
    <rect width="130" height="56" rx="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="65" y="33" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1e40af">用户任务</text>
  </g>

  <g transform="translate(260, 150)" filter="url(#shadow)">
    <rect width="150" height="76" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
    <rect x="0" y="0" width="150" height="5" rx="3" fill="#3b82f6"/>
    <text x="75" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Resume Context</text>
    <text x="75" y="52" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#6b7280">读取 .ai 记忆</text>
  </g>

  <g transform="translate(470, 150)" filter="url(#shadow)">
    <polygon points="75,0 150,38 75,76 0,38" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <text x="75" y="34" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2937">Classify</text>
    <text x="75" y="49" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#6b7280">S0 S1 S2 S3</text>
  </g>

  <g transform="translate(680, 150)" filter="url(#shadow)">
    <rect width="150" height="76" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
    <rect x="0" y="0" width="150" height="5" rx="3" fill="#3b82f6"/>
    <text x="75" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Search Reuse</text>
    <text x="75" y="52" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#6b7280">查找已有 Skill</text>
  </g>

  <g transform="translate(890, 150)" filter="url(#shadow)">
    <polygon points="75,0 150,38 75,76 0,38" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <text x="75" y="34" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2937">Safe?</text>
    <text x="75" y="49" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#6b7280">S0/S1/安全S2</text>
  </g>

  <g transform="translate(1100, 150)" filter="url(#shadow)">
    <rect width="120" height="76" rx="8" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
    <rect x="0" y="0" width="120" height="5" rx="3" fill="#f97316"/>
    <text x="60" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937">S3 / Unsafe</text>
    <text x="60" y="52" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#6b7280">留在 Codex</text>
  </g>

  <!-- lane 2 nodes -->
  <g transform="translate(470, 320)" filter="url(#shadow)">
    <rect width="150" height="76" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="0" y="0" width="150" height="5" rx="3" fill="#8b5cf6"/>
    <text x="75" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Worker Draft</text>
    <text x="75" y="52" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#6b7280">只读 / 安全 patch</text>
  </g>

  <g transform="translate(680, 320)" filter="url(#shadow)">
    <rect width="150" height="76" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="0" y="0" width="150" height="5" rx="3" fill="#8b5cf6"/>
    <text x="75" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Worker Output</text>
    <text x="75" y="52" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#6b7280">摘要 / diff / 风险</text>
  </g>

  <!-- lane 3 nodes -->
  <g transform="translate(260, 490)" filter="url(#shadow)">
    <rect width="150" height="76" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
    <rect x="0" y="0" width="150" height="5" rx="3" fill="#10b981"/>
    <text x="75" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Codex Review</text>
    <text x="75" y="52" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#6b7280">逐行审查</text>
  </g>

  <g transform="translate(470, 490)" filter="url(#shadow)">
    <rect width="150" height="76" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
    <rect x="0" y="0" width="150" height="5" rx="3" fill="#10b981"/>
    <text x="75" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Validate</text>
    <text x="75" y="52" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#6b7280">测试 / lint / 构建</text>
  </g>

  <g transform="translate(680, 490)" filter="url(#shadow)">
    <rect width="150" height="76" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
    <rect x="0" y="0" width="150" height="5" rx="3" fill="#ef4444"/>
    <text x="75" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Checkpoint</text>
    <text x="75" y="52" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#6b7280">git add / commit</text>
  </g>

  <g transform="translate(890, 490)" filter="url(#shadow)">
    <rect width="150" height="76" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
    <rect x="0" y="0" width="150" height="5" rx="3" fill="#3b82f6"/>
    <text x="75" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Done</text>
    <text x="75" y="52" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#6b7280">用户保留最终控制权</text>
  </g>

  <!-- arrows lane 1 -->
  <line x1="210" y1="188" x2="260" y2="188" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="410" y1="188" x2="470" y2="188" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="620" y1="188" x2="680" y2="188" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="830" y1="188" x2="890" y2="188" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1040" y1="188" x2="1100" y2="188" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- arrow down to worker -->
  <path d="M 965 226 L 965 270 L 545 270 L 545 320" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="980" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#6b7280">yes</text>

  <!-- arrows lane 2 -->
  <line x1="620" y1="358" x2="680" y2="358" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- arrow down to review -->
  <path d="M 755 396 L 755 440 L 335 440 L 335 490" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- arrows lane 3 -->
  <line x1="410" y1="528" x2="470" y2="528" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="620" y1="528" x2="680" y2="528" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="830" y1="528" x2="890" y2="528" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- reject loop -->
  <path d="M 335 566 L 335 620 L 545 620 L 545 396" stroke="#f97316" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="360" y="605" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#f97316">reject / unsafe</text>

  <!-- footer -->
  <text x="640" y="690" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#9ca3af">实线 = 主流程 · 虚线 = 拒绝/回退 · 菱形 = 决策</text>
</svg>
